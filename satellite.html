const cities = {
  Mumbai: [19.076, 72.877], Delhi: [28.704, 77.103], Bangalore: [12.972, 77.594],
  Tehran: [35.689, 51.389], Isfahan: [32.652, 51.670], Shiraz: [29.592, 52.584],
  'New York': [40.713, -74.006], 'Los Angeles': [34.052, -118.244], Chicago: [41.878, -87.629]
};

// Animation schedule [startSec, callback]
const S = [];

function at(t, fn) { S.push([t, fn]); }

function setCountry(c, zoom) {
  map.setView(centers[c], zoom, { animate: false });
}

function flyToPos(pos, zoom, dur) {
  map.flyTo(pos, zoom, { duration: dur });
}

function showCountry(c, opacity) {
  highlightLayer.clearLayers();
  if (__GEO[c] && opacity > 0.1) {
    highlightLayer.addData({ type: 'Feature', geometry: __GEO[c], properties: {} });
    highlightLayer.setStyle({ fillOpacity: 0.6 * opacity, opacity });
  }
  label.textContent = c;
  label.style.opacity = opacity;
  cityMarker.setStyle({ opacity: 0, fillOpacity: 0 });
}

function showCity(c, opacity) {
  highlightLayer.clearLayers();
  cityMarker.setLatLng(cities[c]);
  cityMarker.setStyle({ opacity, fillOpacity: 0.9 * opacity });
  label.textContent = c;
  label.style.opacity = opacity;
}

function build() {
  setCountry('India', 4);
  at(0.1, () => flyToPos(centers.India, 6, 2));
  at(2.5, () => showCountry('India', 1));
  at(3.5, () => flyToPos(centers.India, 5, 1));
  at(4.5, () => showCountry('India', 0.3));
  // Mumbai
  at(5.0, () => flyToPos(cities.Mumbai, 12, 1.5));
  at(6.5, () => showCity('Mumbai', 1));
  // Delhi
  at(8.0, () => flyToPos(cities.Delhi, 11, 1.2));
  at(9.2, () => showCity('Delhi', 1));
  // Bangalore
  at(10.7, () => flyToPos(cities.Bangalore, 11, 1.2));
  at(11.9, () => showCity('Bangalore', 1));
  // Fly Iran
  at(13.5, () => {
    highlightLayer.clearLayers(); cityMarker.setStyle({opacity:0,fillOpacity:0}); label.style.opacity=0;
    flyToPos(centers.Iran, 4.5, 3.5);
  });
  // Iran
  at(17, () => showCountry('Iran', 0.3));
  at(17.5, () => flyToPos(centers.Iran, 6, 1.5));
  at(19, () => showCountry('Iran', 1));
  at(20.5, () => flyToPos(centers.Iran, 5, 1));
  at(21.5, () => showCountry('Iran', 0.3));
  // Tehran
  at(22, () => flyToPos(cities.Tehran, 12, 1.5));
  at(23.5, () => showCity('Tehran', 1));
  // Isfahan
  at(25, () => flyToPos(cities.Isfahan, 11, 1.2));
  at(26.2, () => showCity('Isfahan', 1));
  // Fly USA
  at(27.5, () => {
    highlightLayer.clearLayers(); cityMarker.setStyle({opacity:0,fillOpacity:0}); label.style.opacity=0;
    flyToPos(centers.USA, 4, 4);
  });
  // USA
  at(31.5, () => showCountry('USA', 0.3));
  at(32, () => flyToPos(centers.USA, 5.5, 2));
  at(34, () => showCountry('USA', 1));
}

map.whenReady(async () => {
  build();
  // Warmup: cache tiles for all locations
  for (const [n, p] of Object.entries(centers)) {
    for (const z of [4, 5, 6]) {
      map.setView(p, z, { animate: false });
      await new Promise(r => setTimeout(r, 300));
    }
  }
  for (const [n, p] of Object.entries(cities)) {
    map.setView(p, 12, { animate: false });
    await new Promise(r => setTimeout(r, 200));
  }
  // Reset start
  map.setView(centers.India, 4, { animate: false });
  label.textContent = 'India';
  label.style.opacity = 0;
  window.animationReady = true;

  // Schedule all animation events
  let maxT = 0;
  for (const [t, fn] of S) {
    setTimeout(fn, t * 1000);
    if (t > maxT) maxT = t;
  }
  // Signal end
  setTimeout(() => { window.animationDone = true; }, (maxT + 2) * 1000);
});
</script>
</body>
</html>
