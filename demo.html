<!DOCTYPE html>
<html>
<head>
<style>
  body { margin:0; background:#000; }
  canvas { display:block; width:1280px; height:720px; image-rendering:auto; }
</style>
</head>
<body>
<canvas id="c" width="1280" height="720"></canvas>
<script>
const c = document.getElementById('c'), ctx = c.getContext('2d');
const img = new Image();
const ZOOM_SIZE = 8192;

function ll2px(lat, lng) {
  return [(lng + 180) / 360 * ZOOM_SIZE, (90 - lat) / 180 * ZOOM_SIZE];
}

function lerp(a, b, t) { return a + (b - a) * t; }

// Simplified country borders as lat/lng arrays
const borders = {
  india: [
    [6.75, 77.0], [8.0, 77.5], [9.5, 78.0], [10.5, 80.0],
    [13.0, 80.3], [16.0, 82.0], [18.0, 84.0], [20.0, 87.0],
    [21.5, 88.0], [22.5, 88.5], [24.0, 89.0], [26.0, 88.5],
    [27.0, 89.0], [28.0, 88.0], [31.0, 80.0], [32.0, 78.0],
    [34.0, 77.0], [34.5, 75.0], [35.0, 74.0], [34.0, 73.0],
    [33.0, 72.0], [30.0, 69.0], [25.0, 67.0], [23.0, 68.0],
    [22.0, 69.0], [21.0, 70.0], [20.0, 71.0], [18.0, 73.0],
    [15.0, 74.0], [12.0, 74.0], [10.0, 76.0], [8.0, 77.0]
  ],
  iran: [
    [25.0, 56.0], [26.0, 57.0], [27.0, 59.0], [30.0, 61.0],
    [33.0, 60.0], [36.0, 61.0], [37.5, 60.0], [38.0, 57.0],
    [39.0, 55.0], [38.0, 52.0], [37.0, 49.0], [36.0, 46.0],
    [35.0, 46.0], [33.0, 47.0], [31.0, 49.0], [30.0, 48.0],
    [29.0, 48.5], [27.0, 50.0], [25.0, 53.0], [25.0, 55.0]
  ],
  usa: [
    [25.0, -80.0], [24.5, -82.0], [25.0, -82.5], [29.0, -89.0],
    [29.0, -91.0], [27.0, -94.0], [25.5, -97.5], [26.0, -98.0],
    [29.0, -100.0], [30.0, -104.0], [31.0, -106.0], [32.0, -108.0],
    [33.0, -112.0], [32.0, -115.0], [32.5, -117.0], [34.0, -119.0],
    [36.0, -121.0], [37.0, -122.0], [39.0, -123.0], [42.0, -124.0],
    [46.0, -124.0], [48.0, -125.0], [49.0, -122.0], [49.0, -117.0],
    [49.0, -105.0], [49.0, -97.0], [49.0, -90.0], [47.0, -87.0],
    [45.0, -85.0], [44.0, -83.0], [42.0, -80.0], [41.5, -76.0],
    [41.0, -74.0], [40.5, -74.0], [39.0, -75.0], [38.0, -76.0],
    [37.0, -76.0], [35.0, -78.0], [34.0, -79.0], [33.0, -81.0],
    [30.0, -83.0], [28.0, -82.0]
  ]
};

const cities = {
  india: [
    { name: 'Mumbai', lat: 19.07, lng: 72.87 },
    { name: 'Delhi', lat: 28.61, lng: 77.23 },
    { name: 'Bangalore', lat: 12.97, lng: 77.59 }
  ],
  iran: [
    { name: 'Tehran', lat: 35.68, lng: 51.38 },
    { name: 'Isfahan', lat: 32.65, lng: 51.67 }
  ],
  usa: [
    { name: 'New York', lat: 40.71, lng: -74.00 }
  ]
};

const keyframes = [
  { lat: 22, lng: 79, scale: 1.8, country: 'india' },     // 0  India overview
  { lat: 19.07, lng: 72.87, scale: 5, country: 'india' },  // 1  Mumbai
  { lat: 28.61, lng: 77.23, scale: 5, country: 'india' },  // 2  Delhi
  { lat: 12.97, lng: 77.59, scale: 5, country: 'india' },  // 3  Bangalore
  { lat: 22, lng: 79, scale: 1.8, country: 'india' },      // 4  India overview
  { lat: 32, lng: 53, scale: 1.8, country: 'iran' },       // 5  Iran overview
  { lat: 35.68, lng: 51.38, scale: 5, country: 'iran' },   // 6  Tehran
  { lat: 32.65, lng: 51.67, scale: 5, country: 'iran' },   // 7  Isfahan
  { lat: 32, lng: 53, scale: 1.8, country: 'iran' },       // 8  Iran overview
  { lat: 40, lng: -100, scale: 1.5, country: 'usa' },      // 9  USA overview
  { lat: 40.71, lng: -74.00, scale: 5, country: 'usa' },   // 10 New York
  { lat: 40, lng: -100, scale: 1.5, country: 'usa' },      // 11 USA overview
];

const BORDER_COLORS = { india: '#ff9933', iran: '#00cc44', usa: '#3366ff' };

function drawBorder(country) {
  const pts = borders[country];
  if (!pts || pts.length < 3) return;
  const [cx, cy] = ll2px(keyframes[0].lat, keyframes[0].lng);
  ctx.beginPath();
  for (let i = 0; i < pts.length; i++) {
    const [px, py] = ll2px(pts[i][0], pts[i][1]);
    const method = i === 0 ? 'moveTo' : 'lineTo';
    ctx[method](px, py);
  }
  ctx.closePath();
  ctx.strokeStyle = BORDER_COLORS[country];
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.fillStyle = BORDER_COLORS[country] + '22';
  ctx.fill();
}

function drawCityMarkers(country) {
  const list = cities[country];
  if (!list) return;
  for (const city of list) {
    const [px, py] = ll2px(city.lat, city.lng);
    ctx.beginPath();
    ctx.arc(px, py, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#ffdd00';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

window.setFrame = function(frame, total) {
  const t = frame / total;
  const segs = keyframes.length - 1;
  const seg = Math.min(Math.floor(t * segs), segs - 1);
  const localT = (t * segs - seg);
  const kfA = keyframes[seg], kfB = keyframes[seg + 1];

  const lat = lerp(kfA.lat, kfB.lat, localT);
  const lng = lerp(kfA.lng, kfB.lng, localT);
  const scale = lerp(kfA.scale, kfB.scale, localT);

  const [px, py] = ll2px(lat, lng);
  const cx = c.width / 2, cy = c.height / 2;

  ctx.clearRect(0, 0, c.width, c.height);

  // Draw map
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  ctx.translate(-px, -py);
  ctx.drawImage(img, 0, 0);

  // Draw current country border + cities
  const country = kfA.country;
  drawBorder(country);
  drawCityMarkers(country);

  // Also draw next country's border if transitioning
  if (kfB.country !== country) {
    const blend = localT;
    const alpha = blend;
    ctx.globalAlpha = alpha * 0.6;
    const nxtBorder = borders[kfB.country];
    if (nxtBorder && nxtBorder.length >= 3) {
      ctx.beginPath();
      for (let i = 0; i < nxtBorder.length; i++) {
        const [bx, by] = ll2px(nxtBorder[i][0], nxtBorder[i][1]);
        ctx[i === 0 ? 'moveTo' : 'lineTo'](bx, by);
      }
      ctx.closePath();
      ctx.strokeStyle = BORDER_COLORS[kfB.country];
      ctx.lineWidth = 3;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  ctx.restore();
};

window.mapImg = img;
img.src = 'world_map.png';
</script>
</body>
</html>
