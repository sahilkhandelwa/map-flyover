  const latRad = lat * Math.PI / 180;
  const y = (0.5 - Math.log(Math.tan(Math.PI / 4 + latRad / 2)) / (2 * Math.PI)) * Z;
  return [x, y];
}

const COLORS = { india: '#ff9933', iran: '#10b981', usa: '#3b82f6' };
const CITY_INFO = {
  Mumbai:   [19.07, 72.87],
  Delhi:    [28.61, 77.23],
  Bangalore: [12.97, 77.59],
  Tehran:   [35.68, 51.38],

};

function drawBorder(country, alpha) {
  const pts = borders[country];
  if (!pts || pts.length < 3) return;
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  for (let i = 0; i < pts.length; i++) {
    const [px, py] = ll2px(pts[i][0], pts[i][1]);
    ctx[i === 0 ? 'moveTo' : 'lineTo'](px, py);
  }
  ctx.closePath();

  // Fill
  ctx.fillStyle = COLORS[country];
  ctx.globalAlpha = alpha * 0.3;
  ctx.fill();

  // White glow outline (using canvas shadows)
  ctx.globalAlpha = alpha;
  ctx.shadowColor = 'rgba(255,255,255,0.9)';
  ctx.shadowBlur = 12 / (ctx.getTransform().a || 1); // scale glow to screen size
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Colored solid border on top
  ctx.strokeStyle = COLORS[country];
  ctx.lineWidth = 4;
  ctx.stroke();

  ctx.globalAlpha = 1;
}

function drawCityMarker(lat, lng) {
  const [px, py] = ll2px(lat, lng);
  // Glow
  ctx.shadowColor = 'rgba(255,255,255,0.9)';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.arc(px, py, 10, 0, Math.PI * 2);
  ctx.fillStyle = '#22c55e';
  ctx.fill();
  ctx.shadowBlur = 0;
  // White ring
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  // Inner dot
  ctx.beginPath();
  ctx.arc(px, py, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
}

const TOTAL = 540, FPS = 15;
const frames = [];

function hold(s, lat, lng, scale, country) {
  const n = Math.round(s * FPS);
  for (let i = 0; i < n; i++) frames.push({ lat, lng, scale, country, marker: null });
}
function fly(s, lat1, lng1, s1, lat2, lng2, s2, country, marker) {
  const n = Math.max(1, Math.round(s * FPS));
  for (let i = 0; i < n; i++) {
    const t = i / n;
    frames.push({
      lat: lerp(lat1, lat2, t), lng: lerp(lng1, lng2, t),
      scale: lerp(s1, s2, t), country, marker: marker || null
    });
  }
}

hold(3, 40, -100, 1.5, 'usa');

while (frames.length > TOTAL) frames.pop();
while (frames.length < TOTAL) frames.push({ ...frames[frames.length - 1] });

window.setFrame = function(f) {
  const fd = frames[f];
  const [px, py] = ll2px(fd.lat, fd.lng);
  const cx = c.width / 2, cy = c.height / 2;

  ctx.clearRect(0, 0, c.width, c.height);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(fd.scale, fd.scale);
  ctx.translate(-px, -py);
  ctx.drawImage(img, 0, 0);

  drawBorder(fd.country, 1);

  if (f > 0 && frames[f-1].country !== fd.country) drawBorder(frames[f-1].country, 0.4);
  if (f < TOTAL - 1 && frames[f+1].country !== fd.country) drawBorder(frames[f+1].country, 0.15);

  if (fd.marker && CITY_INFO[fd.marker]) {
    drawCityMarker(CITY_INFO[fd.marker][0], CITY_INFO[fd.marker][1]);
  }

  ctx.restore();
};

img.src = 'world_map.png';
