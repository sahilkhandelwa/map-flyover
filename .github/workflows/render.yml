name: Render Map Flyover Videos

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Render videos
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: npm run render

      - name: Upload videos
        uses: actions/upload-artifact@v4
        with:
          name: map-flyover-videos
          path: |
            streets.mp4
            satellite.mp4
            outdoors.mp4
