name: Render Satellite Map Video

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg xvfb python3-pip
          npx playwright install chromium --with-deps
          pip3 install requests pillow -q

      - name: Download & stitch world map
        run: python3 stitch_map.py

      - name: Render video
        run: npm run render

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: satellite-map-flyover
          path: satellite.mp4
